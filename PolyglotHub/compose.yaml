version: latest

services:
  php:
      image: php:8.1-apache
      depends_on:
        database:
          condition: service_healthy
      ports:
        - "8080:80"
      volumes:
        - .:/var/www/html
      networks:
        - polyglothub_default

  database:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: crowdin
      MYSQL_USER: aaliev
      MYSQL_PASSWORD: root
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
            test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
            timeout: 20s
            retries: 10
    volumes:
      - database_data:/var/lib/mysql
    ports:
      - "3308:3306"
    networks:
      - polyglothub_default

networks:
  polyglothub_default:
    driver: bridge

volumes:
  database_data: